title: The Solution Architect
description: >-
  Practical notes on solution architecture and enterprise architecture:
  principles, methodologies, frameworks, and lessons from real systems.
theme: minima
minima:
  skin: dark

markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - about.md

show_excerpts: true

permalink: /:year/:month/:day/:title/

# Site owner / social (edit as you like)
author:
  name: Michael Rossi

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
